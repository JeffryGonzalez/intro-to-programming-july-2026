server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Gzip static assets on the fly
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_types        text/plain text/css application/json application/javascript
                      application/x-javascript text/xml application/xml application/xml+rss
                      text/javascript image/svg+xml application/wasm;

    # Don't cache the app shell — it must always reflect the latest deploy
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires -1;
    }

    # Hashed build artifacts (main-XXXX.js, styles-XXXX.css, etc.) are immutable
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|png|jpe?g|gif|svg|webp|avif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA routing: fall back to index.html for client-side routes /shows/add
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic hardening headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Health check endpoint for orchestrators
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }
}
