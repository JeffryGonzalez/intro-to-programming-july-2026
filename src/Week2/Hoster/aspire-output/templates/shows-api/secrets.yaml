---
apiVersion: "v1"
kind: "Secret"
metadata:
  name: "shows-api-secrets"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "shows-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
stringData:
  ConnectionStrings__shows: "Host=pg-service;Port=5432;Username=postgres;Password={{ .Values.secrets.shows_api.pg_password }};Database=shows"
  SHOWS_PASSWORD: "{{ .Values.secrets.shows_api.pg_password }}"
  SHOWS_URI: "postgresql://postgres:{{ .Values.secrets.shows_api.pg_password }}@pg-service:5432/shows"
type: "Opaque"
