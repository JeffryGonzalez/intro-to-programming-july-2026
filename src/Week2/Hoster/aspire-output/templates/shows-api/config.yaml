---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "shows-api-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "shows-api"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  SHOWS_HOST: "{{ .Values.config.shows_api.SHOWS_HOST }}"
  SHOWS_PORT: "{{ .Values.config.shows_api.SHOWS_PORT }}"
  SHOWS_USERNAME: "{{ .Values.config.shows_api.SHOWS_USERNAME }}"
  SHOWS_JDBCCONNECTIONSTRING: "{{ .Values.config.shows_api.SHOWS_JDBCCONNECTIONSTRING }}"
  SHOWS_DATABASENAME: "{{ .Values.config.shows_api.SHOWS_DATABASENAME }}"
