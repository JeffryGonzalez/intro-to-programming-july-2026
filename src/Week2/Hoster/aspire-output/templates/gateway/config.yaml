---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "gateway-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "gateway"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  ASPNETCORE_ENVIRONMENT: "{{ .Values.config.gateway.ASPNETCORE_ENVIRONMENT }}"
  FRONTEND_HTTP: "{{ .Values.config.gateway.FRONTEND_HTTP }}"
  REVERSEPROXY__ROUTES__route0__MATCH__PATH: "{{ .Values.config.gateway.REVERSEPROXY__ROUTES__route0__MATCH__PATH }}"
  REVERSEPROXY__ROUTES__route0__CLUSTERID: "{{ .Values.config.gateway.REVERSEPROXY__ROUTES__route0__CLUSTERID }}"
  REVERSEPROXY__ROUTES__route1__MATCH__PATH: "{{ .Values.config.gateway.REVERSEPROXY__ROUTES__route1__MATCH__PATH }}"
  REVERSEPROXY__ROUTES__route1__CLUSTERID: "{{ .Values.config.gateway.REVERSEPROXY__ROUTES__route1__CLUSTERID }}"
  REVERSEPROXY__CLUSTERS__cluster_frontend__DESTINATIONS__destination1__ADDRESS: "{{ .Values.config.gateway.REVERSEPROXY__CLUSTERS__cluster_frontend__DESTINATIONS__destination1__ADDRESS }}"
  REVERSEPROXY__CLUSTERS__cluster_shows-api__DESTINATIONS__destination1__ADDRESS: "{{ .Values.config.gateway.REVERSEPROXY__CLUSTERS__cluster_shows_api__DESTINATIONS__destination1__ADDRESS }}"
  services__frontend__http__0: "{{ .Values.config.gateway.services__frontend__http__0 }}"
  SHOWS_API_HTTP: "{{ .Values.config.gateway.SHOWS_API_HTTP }}"
  services__shows-api__http__0: "{{ .Values.config.gateway.services__shows_api__http__0 }}"
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.config.gateway.OTEL_EXPORTER_OTLP_ENDPOINT }}"
  OTEL_EXPORTER_OTLP_PROTOCOL: "{{ .Values.config.gateway.OTEL_EXPORTER_OTLP_PROTOCOL }}"
  OTEL_SERVICE_NAME: "{{ .Values.config.gateway.OTEL_SERVICE_NAME }}"
