---
apiVersion: "v1"
kind: "ConfigMap"
metadata:
  name: "pg-server-config"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/component: "pg-server"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
data:
  POSTGRES_HOST_AUTH_METHOD: "{{ .Values.config.pg_server.POSTGRES_HOST_AUTH_METHOD }}"
  POSTGRES_INITDB_ARGS: "{{ .Values.config.pg_server.POSTGRES_INITDB_ARGS }}"
  POSTGRES_USER: "{{ .Values.config.pg_server.POSTGRES_USER }}"
